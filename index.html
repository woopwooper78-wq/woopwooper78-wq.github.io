<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Application</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        .container { width: 80%; margin: auto; overflow: hidden; }
        #chat { border: 1px solid #ccc; height: 400px; overflow-y: scroll; padding: 10px; background: #fff; }
        #userInput { width: 75%; }
        .message { margin: 10px 0; }
        .user { color: blue; }
        .ai { color: green; }
        #stats { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Chat Application</h1>
        <div id="chat"></div>
        <input type="text" id="userInput" placeholder="Type a message..." />
        <button id="sendButton">Send</button>
        <div id="stats"></div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat');
        const userInput = document.getElementById('userInput');
        const sendButton = document.getElementById('sendButton');
        const statsContainer = document.getElementById('stats');
        let messages = JSON.parse(localStorage.getItem('chatMessages')) || [];

        function renderChat() {
            chatContainer.innerHTML = '';
            messages.forEach((msg, index) => {
                const messageDiv = document.createElement('div');
                messageDiv.classList.add('message');
                messageDiv.classList.add(msg.sender);
                messageDiv.innerText = msg.text;
                chatContainer.appendChild(messageDiv);
            });
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function saveMessages() {
            localStorage.setItem('chatMessages', JSON.stringify(messages));
        }

        function generateAIResponse(userMessage) {
            // Simple keyword-based AI response simulation. 
            const responsePatterns = {
                greeting: 'Hello! How can I assist you today?',
                bye: 'Goodbye! Have a great day!',
                default: 'I am here to help you!'
            };

            if (userMessage.includes('hello')) {
                return responsePatterns.greeting;
            } else if (userMessage.includes('bye')) {
                return responsePatterns.bye;
            }
            return responsePatterns.default;
        }

        function addMessage(sender, text) {
            messages.push({ sender, text });
            saveMessages();
            renderChat();
        }

        sendButton.onclick = function() {
            const userText = userInput.value;
            if (userText) {
                addMessage('user', userText);
                const aiResponse = generateAIResponse(userText);
                addMessage('ai', aiResponse);
                userInput.value = '';
            }
        };

        // Initial render
        renderChat();
    </script>
</body>
</html>
