<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Application</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #chat { border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: scroll; }
        #message { width: 80%; }
        #login { display: none; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <input type="text" id="username" placeholder="Username" />
    <input type="password" id="password" placeholder="Password" />
    <button id="loginButton">Login</button>
    <div id="login">
        <input type="text" id="message" placeholder="Type your message..." />
        <button id="sendButton">Send</button>
    </div>

    <script>
        let user = null;
        let messages = [];

        document.getElementById('loginButton').onclick = function() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            // Here you can implement the actual authentication logic
            if (username && password) {
                user = username;
                document.getElementById('login').style.display = 'block';
                displayMessage(`Welcome, ${user}!`);
            }
        };

        document.getElementById('sendButton').onclick = function() {
            const messageContent = document.getElementById('message').value;
            if (messageContent && user) {
                messages.push({ user: user, message: messageContent });
                displayMessage(`${user}: ${messageContent}`);
                document.getElementById('message').value = '';
                // Implement learning logic here
            }
        };

        function displayMessage(msg) {
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div>${msg}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
