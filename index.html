<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <style>
        body {
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, #1f1f1f, #2c2c2c);
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #header {
            padding: 10px;
            text-align: center;
            background: #333;
        }
        #chat {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }
        .user {
            color: blue;
            margin: 5px 0;
        }
        .ai {
            color: green;
            margin: 5px 0;
        }
        #inputArea {
            display: flex;
            padding: 10px;
            background: #444;
        }
        #input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            margin-right: 10px;
        }
        #adminButton {
            background: #777;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="header">AI Chatbot</div>
    <div id="chat"></div>
    <div id="inputArea">
        <input type="text" id="input" placeholder="Type a message..." />
        <button id="adminButton">Admin</button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const adminButton = document.getElementById('adminButton');

        // Load messages and training data from localStorage
        let messages = JSON.parse(localStorage.getItem('messages')) || [];
        let trainingData = JSON.parse(localStorage.getItem('trainingData')) || {};

        // Function to render messages
        function renderMessages() {
            chat.innerHTML = '';
            messages.forEach(msg => {
                const messageDiv = document.createElement('div');
                messageDiv.className = msg.type;
                messageDiv.textContent = msg.text;
                chat.appendChild(messageDiv);
            });
            chat.scrollTop = chat.scrollHeight;
        }

        // Add message on Enter key press
        input.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                const userMessage = input.value;
                messages.push({ text: userMessage, type: 'user' });
                input.value = '';
                renderMessages();
                // Simulated AI response
                setTimeout(() => {
                    const aiResponse = 'AI: ' + userMessage;  // Replace with actual AI logic
                    messages.push({ text: aiResponse, type: 'ai' });
                    renderMessages();
                }, 500);
                // Save to localStorage
                localStorage.setItem('messages', JSON.stringify(messages));
            }
        });

        // Admin button functionality
        adminButton.addEventListener('click', function() {
            const keyword = prompt('Enter keyword:');
            const response = prompt('Enter response:');
            if (keyword && response) {
                trainingData[keyword] = response;
                localStorage.setItem('trainingData', JSON.stringify(trainingData));
            }
        });

        // Initial render
        renderMessages();
    </script>
</body>
</html>
