<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Application</title>
    <style>
        body {
            background: linear-gradient(to right, #1c1c1c, #3a3a3a);
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #chat {
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .message {
            margin: 10px 0;
            transition: all 0.3s ease;
        }
        #input {
            padding: 10px;
            border: none;
            border-radius: 5px;
            margin-top: auto;
            transition: background 0.3s;
        }
        #input:focus {
            background: #444;
        }
    </style>
</head>
<body>
    <div id="chat">
        <div id="messages"></div>
        <input id="input" type="text" placeholder="Type a message..." />
    </div>
    <script>
        const input = document.getElementById('input');
        const messages = document.getElementById('messages');
        const responses = {
            "hello": "Hi there! How can I help you today?",
            // Add 50+ keyword responses here
        };

        input.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                const message = input.value;
                if (message) {
                    addMessage('You: ' + message);
                    respond(message);
                    input.value = '';
                }
            }
        });

        function addMessage(message) {
            const msgElement = document.createElement('div');
            msgElement.className = 'message';
            msgElement.textContent = message;
            messages.appendChild(msgElement);
            messages.scrollTop = messages.scrollHeight;  // Scroll to the bottom
        }

        function respond(message) {
            const response = responses[message.toLowerCase()] || "I'm not sure how to respond to that.";
            setTimeout(() => addMessage('AI: ' + response), 500);
        }

        // Load persisted messages from localStorage
        function loadMessages() {
            const storedMessages = JSON.parse(localStorage.getItem('chatMessages')) || [];
            storedMessages.forEach(msg => addMessage(msg));
        }

        // Persist messages to localStorage
        const oldAddMessage = addMessage;
        addMessage = function(message) {
            oldAddMessage(message);
            const storedMessages = JSON.parse(localStorage.getItem('chatMessages')) || [];
            storedMessages.push(message);
            localStorage.setItem('chatMessages', JSON.stringify(storedMessages));
        };

        loadMessages();
    </script>
</body>
</html>
