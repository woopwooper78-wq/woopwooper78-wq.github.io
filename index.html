<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chattie - Modern Chat Application</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Add your gradient background and dark theme styles here */
        body {
            background: linear-gradient(90deg, #4b6cb7, #182848);
            color: white;
            font-family: Arial, sans-serif;
        }
        .chat-container {
            /* Define your chat container styles */
        }
        /* Additional styles */
    </style>
</head>
<body>
    <div class="chat-app">
        <header>
            <h1>Chattie</h1>
            <div class="login-register">
                <form id="login-form">
                    <input type="text" placeholder="Username" required>
                    <input type="password" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>
                <form id="register-form">
                    <input type="text" placeholder="Username" required>
                    <input type="password" placeholder="Password" required>
                    <button type="submit">Register</button>
                </form>
            </div>
        </header>
        <div class="chat-area">
            <div class="messages">
                <!-- Messages will appear here -->
            </div>
            <input type="text" id="message-input" placeholder="Type a message...">
            <button id="send-button">Send</button>
            <button id="emoji-button">😊</button>
            <input type="file" id="image-upload" />
            <div class="unread-indicator">
                <!-- Unread message badges will be shown here -->
            </div>
        </div>
        <footer>
            <div id="status-indicators">
                <span class="status online">Online</span>
            </div>
        </footer>
    </div>
    <script>
        // JavaScript for handling messaging, localStorage, emoji picker, image uploads, and Chattie Bot logic
    </script>
</body>
</html>
